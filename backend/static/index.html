<button id="startBtn">🎤 Push to Talk</button>
<button id="stopBtn" class="stop">⏹ Stop</button>
<button id="clearBtn" class="clear">🧹 Clear</button>

<div class="output" id="output"></div>

<script>
let ws;
let mediaRecorder;
let audioStream;
let memory = [];

const output = document.getElementById("output");

function log(text) {
    memory.push(text);
    output.textContent = memory.join("\n\n");
}

const modeSelect = document.getElementById("mode");
const languageWrapper = document.getElementById("languageWrapper");
const languageSelect = languageWrapper.querySelector("select");


modeSelect.addEventListener("change", () => {
    if (modeSelect.value === "translate") {
        languageWrapper.style.display = "block"; // show dropdown
    } else {
        languageWrapper.style.display = "none";  // hide dropdown
    }
});

function connectWS() {
    ws = new WebSocket("wss://lorilee-unadorned-ligia.ngrok-free.dev/ws");

    ws.onopen = () => console.log("Connected to backend");
    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data.type === "transcription") {
            log(`📝 [${data.language}]\n${data.text}`);
        }

        if (data.type === "translation") {
            log(`🌍 [${data.target_language}]\n${data.text}`);
        }
    };
}

connectWS();

document.getElementById("startBtn").onclick = async () => {
    audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });

    mediaRecorder = new MediaRecorder(audioStream, {
        mimeType: "audio/webm"
    });

    ws.send(JSON.stringify({
        mode: document.getElementById("mode").value,
        action: "start"
    }));

    mediaRecorder.ondataavailable = async (e) => {
        const buffer = await e.data.arrayBuffer();
        ws.send(buffer);
    };

    mediaRecorder.start(250); // send chunks every 250ms
};

document.getElementById("stopBtn").onclick = () => {
    mediaRecorder.stop();
    audioStream.getTracks().forEach(t => t.stop());

    const mode = document.getElementById("mode").value;
    const msg = { mode, action: "stop" };
    if (mode === "translate") {
        msg.target = document.getElementById("language").value;
    }
    ws.send(JSON.stringify(msg));

};

document.getElementById("clearBtn").onclick = () => {
    memory = [];
    output.textContent = "";
};
</script>
